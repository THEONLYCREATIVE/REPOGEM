<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retail Performance Tracker</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --accent2: #818cf8;
            --text: #f8fafc;
            --text2: #94a3b8;
            --green: #22c55e;
            --orange: #f59e0b;
            --red: #ef4444;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; padding-bottom: 80px; overflow-x: hidden;
        }
        .screen { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .section-label { font-size: 12px; font-weight: 700; color: var(--accent); letter-spacing: 1px; margin: 24px 0 12px 4px; text-transform: uppercase; }
        .settings-group { background: var(--card-bg); border-radius: 16px; overflow: hidden; margin-bottom: 16px; border: 1px solid rgba(255,255,255,0.05); }
        .settings-row { 
            display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .settings-label { font-size: 15px; font-weight: 500; }
        .settings-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }
        .settings-input { 
            background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(255,255,255,0.1); color: var(--text); 
            padding: 8px 12px; border-radius: 8px; width: 100px; text-align: right; font-family: 'DM Mono', monospace;
        }

        .entry-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
        .entry-card { background: var(--card-bg); padding: 16px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); }
        .entry-card label { display: block; font-size: 11px; font-weight: 700; color: var(--text2); margin-bottom: 8px; }
        .entry-card input { 
            width: 100%; background: transparent; border: none; color: var(--text); font-size: 20px; font-weight: 700; outline: none; padding: 0;
        }
        .calc-row { font-size: 11px; color: var(--accent); margin-top: 6px; font-weight: 600; }

        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; right: 0; background: rgba(30, 41, 59, 0.95); 
            backdrop-filter: blur(10px); display: flex; justify-content: space-around; 
            padding: 12px 8px; border-top: 1px solid rgba(255,255,255,0.1); z-index: 1000;
        }
        .nav-btn { 
            background: none; border: none; color: var(--text2); display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 10px; cursor: pointer; transition: 0.2s;
        }
        .nav-btn.active { color: var(--accent); transform: translateY(-2px); }
        .nav-icon { font-size: 20px; }

        .save-btn { 
            width: 100%; background: var(--accent); border: none; color: var(--bg); padding: 16px; border-radius: 12px; font-weight: 700; font-size: 16px; margin-top: 24px; box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);
        }
    </style>
</head>
<body>

<div id="screen-dashboard" class="screen active">
    <div class="section-label">Performance Overview</div>
    <div id="dashboard-content">
        </div>
</div>

<div id="screen-today" class="screen">
    <div class="section-label">Entry Mode</div>
    <div id="entryGrid" class="entry-grid"></div>
    <button class="save-btn" onclick="saveSlot()">💾 Save Current Slot</button>
</div>

<div id="screen-settings" class="screen">
    <div class="section-label">Weekly Targets (AED)</div>
    <div class="settings-group" id="daily-targets-container">
        </div>

    <div class="section-label">KPI Targets</div>
    <div class="settings-group">
        <div class="settings-row">
            <div><div class="settings-label">ATV Target (AED)</div></div>
            <input class="settings-input" id="set-atv" placeholder="120" oninput="saveSetting('atvTarget',this.value)">
        </div>
        <div class="settings-row">
            <div><div class="settings-label">Conversion % Target</div></div>
            <input class="settings-input" id="set-conv" placeholder="47" oninput="saveSetting('convTarget',this.value)">
        </div>
    </div>
    
    <button class="save-btn" onclick="clearData()" style="background:var(--red); box-shadow:0 4px 15px rgba(239,68,68,0.3);">🗑 Clear All Data</button>
</div>

<div class="bottom-nav">
    <button class="nav-btn active" id="nav-dashboard" onclick="showScreen('dashboard')">
        <span class="nav-icon">🏠</span><span class="nav-label">Home</span>
    </button>
    <button class="nav-btn" id="nav-today" onclick="showScreen('today')">
        <span class="nav-icon">📝</span><span class="nav-label">Entry</span>
    </button>
    <button class="nav-btn" id="nav-settings" onclick="showScreen('settings')">
        <span class="nav-icon">⚙️</span><span class="nav-label">Setup</span>
    </button>
</div>

<script>
const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const DEFAULT_TARGETS = [35000, 35000, 35000, 38000, 45000, 45000, 40000];

let settings = JSON.parse(localStorage.getItem('dst_settings') || '{}');
let salesData = JSON.parse(localStorage.getItem('dst_data') || '{}');
let selectedDate = new Date().toISOString().slice(0,10);

function init() {
    renderSettings();
    renderEntryGrid();
    showScreen('dashboard');
}

function renderSettings() {
    const container = document.getElementById('daily-targets-container');
    container.innerHTML = DAYS.map((day, i) => `
        <div class="settings-row">
            <div><div class="settings-label">${day}</div></div>
            <input class="settings-input" id="tgt-${i}" value="${(settings.dayTargets || DEFAULT_TARGETS)[i]}" 
                   oninput="saveDayTarget(${i}, this.value)">
        </div>
    `).join('');
}

function renderEntryGrid() {
    const grid = document.getElementById('entryGrid');
    grid.innerHTML = `
        <div class="entry-card">
            <label>💰 SALE (AED)</label>
            <input type="number" id="inp-sale" placeholder="0.00" oninput="calculateInPlace()">
        </div>
        <div class="entry-card">
            <label>🔢 TRANSACTIONS</label>
            <input type="number" id="inp-trn" placeholder="0" oninput="calculateInPlace()">
            <div class="calc-row" id="calc-atv">ATV: —</div>
        </div>
        <div class="entry-card">
            <label>👥 FOOTFALL</label>
            <input type="number" id="inp-footfall" placeholder="0" oninput="calculateInPlace()">
            <div class="calc-row" id="calc-conv">Conv: —</div>
        </div>
        <div class="entry-card">
            <label>🟣 NO7 SALE</label>
            <input type="number" id="inp-no7" placeholder="0.00">
        </div>
    `;
}

function calculateInPlace() {
    const sale = parseFloat(document.getElementById('inp-sale').value) || 0;
    const trn = parseFloat(document.getElementById('inp-trn').value) || 0;
    const ff = parseFloat(document.getElementById('inp-footfall').value) || 0;

    // ATV Calculation (Locked to AED logic)
    document.getElementById('calc-atv').textContent = trn > 0 ? `ATV: ${(sale/trn).toFixed(1)} AED` : 'ATV: —';
    document.getElementById('calc-conv').textContent = ff > 0 ? `Conv: ${(trn/ff*100).toFixed(1)}%` : 'Conv: —';
}

function saveDayTarget(index, value) {
    if (!settings.dayTargets) settings.dayTargets = [...DEFAULT_TARGETS];
    settings.dayTargets[index] = parseFloat(value) || 0;
    localStorage.setItem('dst_settings', JSON.stringify(settings));
}

function saveSetting(k, v) {
    settings[k] = v;
    localStorage.setItem('dst_settings', JSON.stringify(settings));
}

function saveSlot() {
    const data = {
        sale: parseFloat(document.getElementById('inp-sale').value) || 0,
        trn: parseFloat(document.getElementById('inp-trn').value) || 0,
        footfall: parseFloat(document.getElementById('inp-footfall').value) || 0,
        no7: parseFloat(document.getElementById('inp-no7').value) || 0
    };
    salesData[selectedDate] = data;
    localStorage.setItem('dst_data', JSON.stringify(salesData));
    alert('Data Saved for ' + selectedDate);
}

function showScreen(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('screen-' + name).classList.add('active');
    document.getElementById('nav-' + name).classList.add('active');
}

function clearData() {
    if(confirm("Delete all history?")) {
        localStorage.clear();
        location.reload();
    }
}

init();
</script>
</body>
</html>
